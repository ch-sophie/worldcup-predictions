name: Live world cup 2026 pipeline

on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        #cache: 'pip' # Speeds up subsequent runs

    - name: Install Dependencies
      run: |
        pip install pandas sqlalchemy numpy psycopg2-binary python-dotenv

    # 1. Load the raw data/scraped CSVs into the SQLite DB
    - name: Load Data into DB
      run: python scrape/loader.py

    # 2. Process, clean, and generate features
    - name: Run Data Cleaner and Feature Engineering
      run: python scrape/cleaner.py

    # 3. Saves the SQLite file backup right back into repository
    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Automation"
        git config --global user.email "actions@github.com"
        
        # Only stage files inside your data folder, avoiding the .db file completely!
        git add data/
        git add -f worldcup_2026.db
        
        # Only commit if actual changes exist so empty runs don't crash
        git diff-index --quiet HEAD || git commit -m "Automated data sync"
        git push